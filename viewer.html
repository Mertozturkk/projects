<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Görüntüleyici</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        header {
            background: #333;
            color: white;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        header a.back {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        header a.back:hover { color: white; }
        header h2 { font-size: 1rem; font-weight: 500; }
        header a.dl {
            color: #ffd700;
            text-decoration: none;
            border: 1px solid #ffd700;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
        }
        header a.dl:hover { background: rgba(255,215,0,0.15); }
        iframe { flex-grow: 1; width: 100%; border: none; }
    </style>
</head>
<body>
    <header>
        <a class="back" href="index.html">← Geri</a>
        <h2 id="title">PDF Görüntüleyici</h2>
        <a class="dl" id="dl-btn" href="#" download>İndir</a>
    </header>
    <iframe id="viewer"></iframe>
    <script>
        const params = new URLSearchParams(location.search);
        const file = params.get('file') || '';
        if (file) {
            document.getElementById('viewer').src = file;
            document.getElementById('dl-btn').href = file;
            document.getElementById('title').textContent = decodeURIComponent(file.replace('.pdf', '').replace(/-/g, ' '));
        }
    </script>
</body>
</html>
